# site properties and page defaults
title: LAMA-WeST-Lab
subtitle: 
description: Neuro-symbolic AI for Web, Semantics and Text.
header: images/logo_banner.jpg
footer: images/logo_banner.jpg
proofer: false

# site social media and other links
links:
  email: amal.zouaq@polymtl.ca
  orcid: 0000-0002-4791-0752
  google-scholar: lqDGv9YAAAAJ
  github: LAMA-WeST-Lab

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_news
  - scope:
      type: "news"
    values:
      layout: post
  # markdown files in /_seminars
  - scope:
      type: "seminars"
    values:
      layout: post

collections:
  # generate page for each member
  members:
    output: true
  # generate page for each news item
  news:
    output: true
  # generate page for each seminar
  seminars:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff

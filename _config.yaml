# site properties and page defaults
title: LAMA-WeST-Lab
subtitle: 
description: An engaging 1-3 sentence description of your lab.
header: images/background.jpg
footer: images/background.jpg
proofer: false

# site social media and other links
links:
  email: contact@LAMA-WeST-Lab.com
  orcid: 0000-0001-8713-9213
  google-scholar: ETJoidYAAAAJ
  github: LAMA-WeST-Lab
  twitter: LAMA-WeST-Lab
  youtube: LAMA-WeST-Lab

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_news
  - scope:
      type: "news"
    values:
      layout: post
  # markdown files in /_seminars
  - scope:
      type: "seminars"
    values:
      layout: post

collections:
  # generate page for each member
  members:
    output: true
  # generate page for each news item
  news:
    output: true
  # generate page for each seminar
  seminars:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff
